<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Login - Traffic System</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        body {
            background: linear-gradient(120deg, #2c3e50, #3498db);
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: Arial;
        }

        .login-box {
            background: white;
            padding: 30px;
            border-radius: 15px;
            width: 350px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.3);
        }

        h2 {
            text-align: center;
            margin-bottom: 20px;
        }

        .btn-login {
            width: 100%;
            border-radius: 25px;
        }
    </style>
</head>

<body>

<div class="login-box">

    <h2>🚓 Traffic Login</h2>

    <form method="POST">

        <label>Username</label>
        <input type="text" name="username" class="form-control mb-3" placeholder="Enter username" required>

        <label>Password</label>
        <input type="password" name="password" class="form-control mb-3" placeholder="Enter password" required>

        <button type="submit" class="btn btn-primary btn-login">
            🔐 Login
        </button>

    </form>

</div>

</body>
</html>
